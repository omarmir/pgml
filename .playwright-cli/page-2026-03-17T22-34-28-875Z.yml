              - heading "How to write PGML" [level=2] [ref=e69]
            - paragraph [ref=e70]: The grammar stays close to DBML concepts where that helps readability, then adds blocks for Postgres-only objects and layout hints.
          - generic [ref=e71]:
            - article [ref=e72]:
              - heading "Core block model" [level=3] [ref=e73]
              - paragraph [ref=e74]: PGML extends DBML with Postgres-native object blocks. Keep the syntax readable, diffable, and structured like source code instead of handwritten SQL migrations.
              - generic [ref=e75]: "Table public.orders in Commerce { id uuid [pk] tenant_id uuid [not null, ref: > public.tenants.id] status text [not null] total_cents integer [not null] Index idx_orders_status (status) [type: btree] Constraint chk_total: total_cents >= 0 }"
            - article [ref=e76]:
              - heading "Group related tables" [level=3] [ref=e77]
              - paragraph [ref=e78]: Table groups influence both organization in source and layout in the diagram studio. Use them to cluster domains like identity, billing, analytics, or fulfillment.
